{% extends "recipes/base.html" %}
{% load icons %}

{% block title %}Log in{% endblock title %}

{% block content %}
    <section class="card stack">
        <h1>{% icon 'login' extra_classes='icon-inline' %}Log in</h1>
        <p>
            <a class="btn" href="{% url 'social:begin' 'google-oauth2' %}">
                {% icon 'google' extra_classes='button-icon' %}
                Sign in with Google
            </a>
        </p>
    </section>
{% endblock content %}
